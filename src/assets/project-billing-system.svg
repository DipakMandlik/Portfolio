<svg width="1280" height="896" viewBox="0 0 1280 896" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cloth Store Billing System</title>
  <desc id="desc">POS and billing system for Dipak Cloth Stores</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b2a6b" />
      <stop offset="55%" stop-color="#0a0a0b" />
      <stop offset="100%" stop-color="#050507" />
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#2f6bff" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#2f6bff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1280" height="896" fill="url(#bg)" />
  <rect width="1280" height="896" fill="url(#glow)" />

  <!-- receipt/paper motif -->
  <g transform="translate(830,180)">
    <path d="M0 0 H320 V560 L300 540 L280 560 L260 540 L240 560 L220 540 L200 560 L180 540 L160 560 L140 540 L120 560 L100 540 L80 560 L60 540 L40 560 L20 540 L0 560 Z"
      fill="#ffffff" fill-opacity="0.06" stroke="#2f6bff" stroke-opacity="0.35" stroke-width="1.5" />
    <line x1="30" y1="50" x2="290" y2="50" stroke="#2f6bff" stroke-opacity="0.5" stroke-width="2" />
    <line x1="30" y1="90" x2="230" y2="90" stroke="#ffffff" stroke-opacity="0.25" stroke-width="6" />
    <line x1="30" y1="120" x2="270" y2="120" stroke="#ffffff" stroke-opacity="0.18" stroke-width="6" />
    <line x1="30" y1="150" x2="200" y2="150" stroke="#ffffff" stroke-opacity="0.18" stroke-width="6" />
    <line x1="30" y1="180" x2="250" y2="180" stroke="#ffffff" stroke-opacity="0.18" stroke-width="6" />
    <line x1="30" y1="230" x2="290" y2="230" stroke="#2f6bff" stroke-opacity="0.4" stroke-width="2" />
    <text x="180" y="290" font-family="Georgia, serif" font-size="56" fill="#2f6bff" text-anchor="middle" opacity="0.9">₹</text>
  </g>

  <text x="80" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="52" fill="#f5f6f8" font-weight="600">
    Billing System
  </text>
  <text x="80" y="222" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#9aa7c7" letter-spacing="0.04em">
    POS FOR DIPAK CLOTH STORES · MARATHI UI
  </text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#c7d0ea">
    <rect x="80" y="800" width="110" height="34" rx="17" fill="#ffffff" fill-opacity="0.08" />
    <text x="103" y="822">POS</text>

    <rect x="202" y="800" width="140" height="34" rx="17" fill="#ffffff" fill-opacity="0.08" />
    <text x="225" y="822">Supabase</text>

    <rect x="354" y="800" width="150" height="34" rx="17" fill="#ffffff" fill-opacity="0.08" />
    <text x="377" y="822">Role-based Auth</text>

    <rect x="516" y="800" width="170" height="34" rx="17" fill="#ffffff" fill-opacity="0.08" />
    <text x="539" y="822">WhatsApp Share</text>
  </g>
</svg>
