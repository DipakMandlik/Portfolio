  </text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#c7d0ea">
    <rect x="80" y="800" width="110" height="34" rx="17" fill="#ffffff" fill-opacity="0.08" />
    <text x="103" y="822">MERN</text>

    <rect x="202" y="800" width="120" height="34" rx="17" fill="#ffffff" fill-opacity="0.08" />
    <text x="225" y="822">Quizzes</text>

    <rect x="334" y="800" width="150" height="34" rx="17" fill="#ffffff" fill-opacity="0.08" />
    <text x="357" y="822">Certificates</text>

    <rect x="496" y="800" width="180" height="34" rx="17" fill="#ffffff" fill-opacity="0.08" />
    <text x="519" y="822">ChatGPT Assistant</text>
  </g>
