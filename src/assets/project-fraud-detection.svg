<svg width="1280" height="896" viewBox="0 0 1280 896" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fraud Detection Platform</title>
  <desc id="desc">Real-time transaction monitoring and fraud investigation platform</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b2a6b" />
      <stop offset="55%" stop-color="#0a0a0b" />
      <stop offset="100%" stop-color="#050507" />
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="24%" r="55%">
      <stop offset="0%" stop-color="#2f6bff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#2f6bff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="lineFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2f6bff" stop-opacity="0" />
      <stop offset="50%" stop-color="#2f6bff" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#2f6bff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="1280" height="896" fill="url(#bg)" />
  <rect width="1280" height="896" fill="url(#glow)" />

  <!-- graph/network motif: nodes + connecting edges, suggesting transaction graph -->
  <g stroke="#2f6bff" stroke-opacity="0.35" stroke-width="1.5" fill="none">
    <path d="M 120 620 L 340 520 L 560 640 L 780 480 L 1000 560 L 1160 420" />
    <path d="M 340 520 L 420 340" />
    <path d="M 560 640 L 640 780" />
    <path d="M 780 480 L 900 320" />
    <path d="M 1000 560 L 1080 700" />
  </g>
  <g fill="#2f6bff">
    <circle cx="120" cy="620" r="5" opacity="0.8" />
    <circle cx="340" cy="520" r="6" opacity="0.9" />
    <circle cx="420" cy="340" r="4" opacity="0.6" />
    <circle cx="560" cy="640" r="7" opacity="0.95" />
    <circle cx="640" cy="780" r="4" opacity="0.5" />
    <circle cx="780" cy="480" r="6" opacity="0.9" />
    <circle cx="900" cy="320" r="4" opacity="0.6" />
    <circle cx="1000" cy="560" r="6" opacity="0.9" />
    <circle cx="1080" cy="700" r="4" opacity="0.55" />
    <circle cx="1160" cy="420" r="5" opacity="0.7" />
  </g>
  <!-- flagged node highlighted as a fraud alert -->
  <circle cx="560" cy="640" r="16" fill="none" stroke="#ff4d4f" stroke-width="2" opacity="0.9" />
  <circle cx="560" cy="640" r="26" fill="none" stroke="#ff4d4f" stroke-width="1.2" opacity="0.4" />

  <rect x="80" y="120" width="1" height="1" fill="none" />
  <line x1="80" y1="252" x2="620" y2="252" stroke="url(#lineFade)" stroke-width="1" />

  <text x="80" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="56" fill="#f5f6f8" font-weight="600">
    Fraud Detection Platform
  </text>
  <text x="80" y="222" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#9aa7c7" letter-spacing="0.06em">
    REAL-TIME RISK ENGINE · 17-RULE DETECTION · EXPLAINABLE AI SCORING
  </text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#c7d0ea">
    <rect x="80" y="800" width="150" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" />
    <text x="103" y="822">React · TS</text>

    <rect x="242" y="800" width="130" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" />
    <text x="265" y="822">FastAPI</text>

    <rect x="384" y="800" width="150" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" />
    <text x="407" y="822">PostgreSQL</text>

    <rect x="546" y="800" width="110" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" />
    <text x="569" y="822">Redis</text>

    <rect x="668" y="800" width="150" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" />
    <text x="691" y="822">WebSockets</text>
  </g>
</svg>
